schema: spec-driven

context: |
  本仓库由 rmux session 项目维护。
  所有实现类任务必须先创建 OpenSpec change，再按 tasks.md 小步实施。
  OpenSpec artifact 使用简体中文，并与对应代码改动放在同一个 commit。

rules:
  proposal:
    - 使用简体中文描述 Why、What Changes、Capabilities 和 Impact。
  design:
    - 记录领域边界、技术决策、风险和非目标。
  tasks:
    - 任务必须可验证，完成后立即把复选框改为已完成。
